<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>インドネシア スポット案内</title>
<link rel="stylesheet" href="style.css">
</head>
<body>
<header>
  <h1>📍 ジャカルタ スポット案内</h1>
  <button id="locate-btn">📡 現在地を取得</button>
  <div id="status"></div>
</header>

<nav id="category-bar"></nav>

<main id="card-list"></main>

<template id="card-template">
  <a class="card" target="_blank" rel="noopener">
    <div class="card-top">
      <span class="card-emoji"></span>
      <span class="card-name"></span>
    </div>
    <div class="card-distance"></div>
    <div class="card-address"></div>
  </a>
</template>

<script src="data.js"></script>
<script src="app.js"></script>
</body>
</html>
