<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Jakarta Travel Manager</title>
<style>
:root {
  --bg: #efede8; --surface: #faf9f6; --surface2: #e7e4dd;
  --border: #dcd8ce; --border2: #c9c4b8;
  --text: #26231d; --muted: #7d776b;
  --accent: #8f6b26; --accent2: #3f7a4f; --accent3: #3c6f99;
  --danger: #a84c4c; --on-accent: #fffaf0;
  --mono: ui-monospace,'SF Mono',Menlo,Consolas,monospace;
  --sans: 'Hiragino Sans','Hiragino Kaku Gothic ProN','Yu Gothic',system-ui,sans-serif;
  --radius: 8px; --radius-lg: 12px;
}
@media (prefers-color-scheme: dark) { :root {
  --bg:#0f0f0f;--surface:#1a1a1a;--surface2:#222;
  --border:#2e2e2e;--border2:#3a3a3a;--text:#e8e4dc;--muted:#888;
  --accent:#c8a96e;--accent2:#7db88a;--accent3:#6e9fc8;
  --danger:#c86e6e;--on-accent:#1a1200;
}}
:root[data-theme="dark"] {
  --bg:#0f0f0f;--surface:#1a1a1a;--surface2:#222;
  --border:#2e2e2e;--border2:#3a3a3a;--text:#e8e4dc;--muted:#888;
  --accent:#c8a96e;--accent2:#7db88a;--accent3:#6e9fc8;
  --danger:#c86e6e;--on-accent:#1a1200;
}
:root[data-theme="light"] {
  --bg:#efede8;--surface:#faf9f6;--surface2:#e7e4dd;
  --border:#dcd8ce;--border2:#c9c4b8;--text:#26231d;--muted:#7d776b;
  --accent:#8f6b26;--accent2:#3f7a4f;--accent3:#3c6f99;
  --danger:#a84c4c;--on-accent:#fffaf0;
}
*{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%;overflow:hidden}
body{background:var(--bg);font-family:var(--sans)}

.app{display:flex;height:100dvh;overflow:hidden;background:var(--bg);color:var(--text)}
.sidebar{width:200px;flex-shrink:0;background:var(--surface);border-right:1px solid var(--border);display:flex;flex-direction:column}
.sidebar-logo{padding:20px 18px 16px;border-bottom:1px solid var(--border)}
.sidebar-logo .city{font-family:var(--mono);font-size:11px;color:var(--accent);letter-spacing:.12em;text-transform:uppercase;margin-bottom:2px}
.sidebar-logo .title{font-size:15px;font-weight:700}
.nav{flex:1;padding:12px 8px;display:flex;flex-direction:column;gap:2px}
.nav-item{display:flex;align-items:center;gap:10px;padding:9px 12px;border-radius:var(--radius);cursor:pointer;border:none;background:transparent;color:var(--muted);font-family:var(--sans);font-size:13px;width:100%;text-align:left;transition:background .15s,color .15s}
.nav-item:hover{background:var(--surface2);color:var(--text)}
.nav-item.active{background:var(--surface2);color:var(--text)}
.nav-item .nav-icon{font-size:15px;width:18px;text-align:center}
.nav-badge{margin-left:auto;font-family:var(--mono);font-size:10px;background:var(--border2);color:var(--muted);padding:1px 6px;border-radius:99px;min-width:22px;text-align:center}
.nav-item.active .nav-badge{background:var(--accent);color:var(--on-accent)}
.sidebar-footer{padding:12px 14px;border-top:1px solid var(--border);font-family:var(--mono);font-size:10px;color:var(--muted);text-align:center}

.main{flex:1;display:flex;flex-direction:column;overflow:hidden;min-width:0}
.topbar{height:52px;border-bottom:1px solid var(--border);display:flex;align-items:center;padding:0 24px;gap:12px;flex-shrink:0}
.topbar-title{font-size:14px;font-weight:700;flex:1}
.topbar-sub{font-family:var(--mono);font-size:11px;color:var(--muted)}
.content{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch;padding:20px 24px 40px}
.content::-webkit-scrollbar{width:4px}
.content::-webkit-scrollbar-thumb{background:var(--border2);border-radius:99px}

.stats-row{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-bottom:20px}
.stat-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius-lg);padding:14px 8px;text-align:center}
.stat-num{font-family:var(--mono);font-size:22px;font-weight:500;color:var(--accent);font-variant-numeric:tabular-nums;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.stat-lbl{font-size:11px;color:var(--muted);margin-top:3px}

.progress-bar{height:4px;background:var(--surface2);border-radius:99px;margin-bottom:16px;overflow:hidden}
.progress-fill{height:100%;background:linear-gradient(90deg,var(--accent2),var(--accent));border-radius:99px;transition:width .4s ease}

.filter-row{display:flex;gap:6px;margin-bottom:16px;flex-wrap:wrap}
.filter-btn{font-size:12px;font-family:var(--mono);padding:6px 14px;border-radius:99px;border:1px solid var(--border2);background:transparent;cursor:pointer;color:var(--muted);letter-spacing:.04em;transition:all .15s}
.filter-btn:hover{border-color:var(--accent);color:var(--accent)}
.filter-btn.active{background:var(--accent);color:var(--on-accent);border-color:var(--accent)}

.section-wrap{margin-bottom:10px}
.section-hdr{display:flex;align-items:center;gap:8px;padding:12px 14px;background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);cursor:pointer;user-select:none;-webkit-user-select:none;transition:background .15s}
.section-hdr:hover{background:var(--surface2)}
.section-hdr.open{border-radius:var(--radius) var(--radius) 0 0}
.sec-icon{font-size:14px}
.sec-name{font-size:13px;font-weight:500;flex:1}
.sec-count{font-family:var(--mono);font-size:10px;color:var(--muted);background:var(--surface2);padding:2px 8px;border-radius:99px;font-variant-numeric:tabular-nums}
.sec-count.complete{background:var(--accent2);color:var(--on-accent)}
.sec-chev{font-size:12px;color:var(--muted);transition:transform .2s}
.sec-body{background:var(--surface);border:1px solid var(--border);border-top:none;border-radius:0 0 var(--radius) var(--radius);padding:0 14px}

.chk-item{display:flex;align-items:flex-start;gap:12px;padding:12px 0;border-bottom:1px solid var(--border)}
.chk-item:last-child{border-bottom:none}
.chk-cb{width:20px;height:20px;cursor:pointer;accent-color:var(--accent);margin-top:1px;flex-shrink:0}
.chk-content{flex:1;min-width:0}
.chk-label{font-size:14px;line-height:1.4}
.chk-label.done{text-decoration:line-through;color:var(--muted)}
.chk-note{font-size:11px;color:var(--muted);margin-top:2px;font-family:var(--mono)}
.del-btn{background:none;border:none;color:var(--border2);cursor:pointer;font-size:15px;padding:4px 8px;border-radius:4px;flex-shrink:0;line-height:1;transition:color .15s,background .15s}
.del-btn:hover{color:var(--danger);background:color-mix(in srgb,var(--danger) 12%,transparent)}

.add-form{display:flex;gap:8px;flex-wrap:wrap;margin-top:16px;background:var(--surface);border:1px solid var(--border);border-radius:var(--radius-lg);padding:14px}
.add-form input,.add-form select{background:var(--surface2);border:1px solid var(--border2);border-radius:var(--radius);padding:10px 12px;color:var(--text);font-family:var(--sans);font-size:16px;outline:none;transition:border-color .15s;min-width:0}
.add-form input:focus,.add-form select:focus{border-color:var(--accent)}
.add-form input{flex:1;min-width:120px}
.add-form select{min-width:110px}
.btn-add{background:var(--accent);border:none;border-radius:var(--radius);padding:10px 16px;color:var(--on-accent);font-family:var(--sans);font-size:13px;font-weight:700;cursor:pointer;white-space:nowrap;transition:opacity .15s}
.btn-add:hover{opacity:.85}
.btn-ghost{background:transparent;border:1px dashed var(--border2);border-radius:var(--radius);padding:10px 16px;color:var(--muted);font-family:var(--sans);font-size:13px;cursor:pointer;width:100%;transition:color .15s,border-color .15s}
.btn-ghost:hover{color:var(--accent);border-color:var(--accent)}

.cat-mgr{margin-top:10px}
.cat-row{display:flex;align-items:center;gap:10px;padding:10px 0;border-bottom:1px solid var(--border)}
.cat-row:last-child{border-bottom:none}
.cat-row-name{font-size:13px;flex:1;min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}

.exp-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;width:100%}
.exp-grid .full{grid-column:1/-1}
.exp-table-wrap{overflow-x:auto}
.exp-table{width:100%;border-collapse:collapse;font-size:12px;table-layout:fixed}
.exp-table th{text-align:left;font-family:var(--mono);font-size:10px;letter-spacing:.08em;color:var(--muted);padding:6px 8px;border-bottom:1px solid var(--border)}
.exp-table td{padding:10px 8px;border-bottom:1px solid var(--border);overflow:hidden;text-overflow:ellipsis;white-space:nowrap;vertical-align:middle;font-variant-numeric:tabular-nums}
.exp-table tr:last-child td{border-bottom:none}
.cat-dot{width:6px;height:6px;border-radius:50%;display:inline-block;margin-right:5px;vertical-align:middle}
.total-bar{display:flex;justify-content:space-between;align-items:center;padding:12px 0 0;border-top:1px solid var(--border);margin-top:4px}
.total-bar .lbl{font-size:12px;color:var(--muted);font-family:var(--mono)}
.total-bar .amt{font-size:20px;font-weight:700;font-family:var(--mono);color:var(--accent);font-variant-numeric:tabular-nums}

.todo-item{display:flex;align-items:flex-start;gap:12px;padding:12px 0;border-bottom:1px solid var(--border)}
.todo-item:last-child{border-bottom:none}
.todo-name{font-size:14px;line-height:1.4}
.todo-name.done{text-decoration:line-through;color:var(--muted)}
.todo-note{font-size:11px;color:var(--muted);margin-top:2px;font-family:var(--mono)}

.tag{font-size:10px;font-family:var(--mono);padding:2px 7px;border-radius:99px;margin-right:5px;white-space:nowrap}
.tag-food{background:color-mix(in srgb,var(--accent) 14%,transparent);color:var(--accent)}
.tag-sight{background:color-mix(in srgb,var(--accent3) 14%,transparent);color:var(--accent3)}
.tag-shop{background:color-mix(in srgb,var(--accent2) 14%,transparent);color:var(--accent2)}
.tag-other{background:var(--surface2);color:var(--muted)}

.card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius-lg);padding:16px;margin-bottom:12px}
.card-title{font-size:11px;font-family:var(--mono);color:var(--muted);letter-spacing:.08em;text-transform:uppercase;margin-bottom:12px}
.card-hint{font-size:11px;color:var(--muted);margin-top:10px;line-height:1.5}

.toast{position:fixed;bottom:20px;left:50%;transform:translateX(-50%) translateY(80px);background:var(--surface2);border:1px solid var(--border2);color:var(--text);font-size:12px;font-family:var(--mono);padding:8px 18px;border-radius:99px;transition:transform .3s ease;z-index:999;white-space:nowrap}
.toast.show{transform:translateX(-50%) translateY(0)}

.pane{display:none}
.pane.active{display:block}
.empty-msg{font-size:12px;color:var(--muted);padding:12px 0}

/* === SPOT PANE === */
#spot-status{font-size:0.82rem;color:var(--muted);margin-top:6px;min-height:1.1em}
#spot-locate-btn{width:100%;padding:13px;font-size:1rem;border:none;border-radius:10px;background:var(--accent);color:var(--on-accent);font-weight:700;cursor:pointer;font-family:var(--sans)}
#spot-locate-btn:active{opacity:.8}
#spot-cat-bar{display:flex;gap:6px;overflow-x:auto;-webkit-overflow-scrolling:touch;padding:10px 0 6px;margin-bottom:8px}
#spot-cat-bar::-webkit-scrollbar{display:none}
.spot-cat-btn{flex:0 0 auto;padding:7px 14px;border-radius:20px;border:1px solid var(--border2);background:transparent;color:var(--muted);font-size:0.85rem;white-space:nowrap;cursor:pointer;font-family:var(--sans)}
.spot-cat-btn.active{background:var(--accent);color:var(--on-accent);border-color:var(--accent)}
.spot-card{display:block;background:var(--surface);border:1px solid var(--border);border-radius:var(--radius-lg);padding:12px 14px;text-decoration:none;color:inherit;margin-bottom:10px}
.spot-card:active{background:var(--surface2)}
.spot-card-top{display:flex;align-items:center;gap:8px;font-weight:bold;font-size:1rem}
.spot-dist{color:var(--accent);font-weight:bold;margin-top:4px;font-size:0.9rem;font-family:var(--mono)}
.spot-addr{margin-top:3px;font-size:0.78rem;color:var(--muted);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
#spot-list{padding-top:4px}
.spot-empty{text-align:center;color:var(--muted);padding:40px 0;font-size:13px}

/* === MOBILE === */
@media (max-width:700px) {
  .app{flex-direction:column}
  .main{order:1}
  .sidebar{order:2;width:100%;border-right:none;border-top:1px solid var(--border);flex-direction:row;flex-shrink:0}
  .sidebar-logo,.sidebar-footer{display:none}
  .nav{flex-direction:row;padding:6px 8px calc(6px + env(safe-area-inset-bottom));gap:4px}
  .nav-item{flex-direction:column;gap:3px;align-items:center;justify-content:center;text-align:center;font-size:10px;padding:7px 2px}
  .nav-item .nav-icon{width:auto;font-size:17px}
  .nav-badge{margin-left:0}
  .topbar{height:46px;padding:0 16px}
  .content{padding:14px 14px 30px}
  .stats-row{gap:8px;margin-bottom:14px}
  .stat-card{padding:10px 4px}
  .stat-num{font-size:18px}
  .stat-lbl{font-size:10px}
  .add-form{padding:12px}
  .add-form select{min-width:0;flex:1 1 100%}
  .toast{bottom:90px}
}
</style>
</head>
<body>
<div class="app">
<nav class="sidebar">
  <div class="sidebar-logo">
    <div class="city">Jakarta</div>
    <div class="title">Travel Manager</div>
  </div>
  <div class="nav">
    <button class="nav-item active" onclick="switchTab('checklist')">
      <span class="nav-icon">☑</span><span>持ち物</span>
      <span class="nav-badge" id="nav-badge-chk">0</span>
    </button>
    <button class="nav-item" onclick="switchTab('expense')">
      <span class="nav-icon">¥</span><span>費用</span>
      <span class="nav-badge" id="nav-badge-exp">0</span>
    </button>
    <button class="nav-item" onclick="switchTab('todo')">
      <span class="nav-icon">📍</span><span>現地メモ</span>
      <span class="nav-badge" id="nav-badge-todo">0</span>
    </button>
    <button class="nav-item" onclick="switchTab('spot')">
      <span class="nav-icon">🗺</span><span>スポット</span>
      <span class="nav-badge" id="nav-badge-spot">202</span>
    </button>
  </div>
  <div class="sidebar-footer">データは自動保存されます</div>
</nav>

<div class="main">
  <div class="topbar">
    <div class="topbar-title" id="topbar-title">持ち物リスト</div>
    <div class="topbar-sub" id="topbar-sub"></div>
  </div>
  <div class="content">

    <!-- CHECKLIST -->
    <div id="pane-checklist" class="pane active">
      <div class="stats-row">
        <div class="stat-card"><div class="stat-num" id="chk-stat-done">0</div><div class="stat-lbl">チェック済み</div></div>
        <div class="stat-card"><div class="stat-num" id="chk-stat-total">0</div><div class="stat-lbl">合計アイテム</div></div>
        <div class="stat-card"><div class="stat-num" id="chk-stat-pct">0%</div><div class="stat-lbl">進捗</div></div>
      </div>
      <div class="progress-bar"><div class="progress-fill" id="chk-progress" style="width:0%"></div></div>
      <div class="filter-row">
        <button class="filter-btn active" onclick="setFilter('all',this)">ALL</button>
        <button class="filter-btn" onclick="setFilter('undone',this)">未チェック</button>
        <button class="filter-btn" onclick="setFilter('done',this)">済み</button>
      </div>
      <div id="chk-groups"></div>
      <div class="add-form">
        <select id="chk-cat-sel"></select>
        <input type="text" id="chk-new-name" placeholder="アイテム名...">
        <input type="text" id="chk-new-note" placeholder="備考（任意）">
        <button class="btn-add" onclick="addChk()">＋ 追加</button>
      </div>
      <div class="cat-mgr">
        <button class="btn-ghost" id="cat-mgr-toggle" onclick="toggleCatMgr()">⚙ カテゴリを編集する</button>
        <div class="card" id="cat-mgr-card" style="display:none;margin-top:10px">
          <div class="card-title">カテゴリ管理</div>
          <div id="cat-list"></div>
          <div class="add-form" style="margin-top:12px;background:transparent;border:none;padding:0">
            <input type="text" id="new-cat-icon" placeholder="絵文字" maxlength="2" style="flex:0 0 74px">
            <input type="text" id="new-cat-name" placeholder="新しいカテゴリ名">
            <button class="btn-add" onclick="addCat()">＋ 追加</button>
          </div>
          <div class="card-hint">✕ でカテゴリを削除できます。中にアイテムがあるカテゴリは、アイテムごと削除されます。</div>
        </div>
      </div>
    </div>

    <!-- EXPENSE -->
    <div id="pane-expense" class="pane">
      <div class="stats-row">
        <div class="stat-card"><div class="stat-num" id="exp-stat-jpy">¥0</div><div class="stat-lbl">合計（円）</div></div>
        <div class="stat-card"><div class="stat-num" id="exp-stat-idr">Rp0</div><div class="stat-lbl">合計（ルピア）</div></div>
        <div class="stat-card"><div class="stat-num" id="exp-stat-cnt">0</div><div class="stat-lbl">記録件数</div></div>
      </div>
      <div class="card">
        <div class="card-title">新規追加</div>
        <div class="exp-grid">
          <input type="text" id="exp-name" placeholder="内容（例：Grab 空港→ホテル）" class="full" style="background:var(--surface2);border:1px solid var(--border2);border-radius:var(--radius);padding:10px 12px;color:var(--text);font-family:var(--sans);font-size:16px;outline:none">
          <select id="exp-cat" style="background:var(--surface2);border:1px solid var(--border2);border-radius:var(--radius);padding:10px 12px;color:var(--text);font-family:var(--sans);font-size:16px;outline:none">
            <option>交通</option><option>食事</option><option>宿泊</option>
            <option>観光</option><option>ショッピング</option><option>その他</option>
          </select>
          <select id="exp-cur" style="background:var(--surface2);border:1px solid var(--border2);border-radius:var(--radius);padding:10px 12px;color:var(--text);font-family:var(--sans);font-size:16px;outline:none">
            <option value="JPY">円 JPY</option>
            <option value="IDR">ルピア IDR</option>
            <option value="USD">ドル USD</option>
          </select>
          <input type="number" id="exp-amt" placeholder="金額" style="background:var(--surface2);border:1px solid var(--border2);border-radius:var(--radius);padding:10px 12px;color:var(--text);font-family:var(--sans);font-size:16px;outline:none">
          <input type="date" id="exp-date" style="background:var(--surface2);border:1px solid var(--border2);border-radius:var(--radius);padding:10px 12px;color:var(--text);font-family:var(--sans);font-size:16px;outline:none">
          <button class="btn-add full" onclick="addExp()">＋ 費用を追加</button>
        </div>
      </div>
      <div class="card">
        <div class="card-title">記録一覧</div>
        <div class="exp-table-wrap">
          <table class="exp-table">
            <colgroup><col style="width:80px"><col><col style="width:80px"><col style="width:90px"><col style="width:34px"></colgroup>
            <thead><tr><th>日付</th><th>内容</th><th>カテゴリ</th><th style="text-align:right">金額</th><th></th></tr></thead>
            <tbody id="exp-tbody"></tbody>
          </table>
        </div>
        <div class="total-bar">
          <span class="lbl">TOTAL (JPY)</span>
          <span class="amt" id="exp-grand">¥0</span>
        </div>
      </div>
    </div>

    <!-- TODO / 現地メモ -->
    <div id="pane-todo" class="pane">
      <div class="stats-row">
        <div class="stat-card"><div class="stat-num" id="td-stat-done">0</div><div class="stat-lbl">済み</div></div>
        <div class="stat-card"><div class="stat-num" id="td-stat-left">0</div><div class="stat-lbl">残り</div></div>
        <div class="stat-card"><div class="stat-num" id="td-stat-total">0</div><div class="stat-lbl">合計</div></div>
      </div>
      <div id="todo-groups"></div>
      <div class="add-form">
        <select id="td-cat-sel">
          <option value="food">食事</option>
          <option value="sight">観光</option>
          <option value="shop">ショッピング</option>
          <option value="other">その他</option>
        </select>
        <input type="text" id="td-name" placeholder="場所・やること...">
        <input type="text" id="td-note" placeholder="メモ（任意）">
        <button class="btn-add" onclick="addTodo()">＋ 追加</button>
      </div>
    </div>

    <!-- SPOT -->
    <div id="pane-spot" class="pane">
      <button id="spot-locate-btn" onclick="spotLocate()">📡 現在地を取得して近い順に並べる</button>
      <div id="spot-status"></div>
      <div id="spot-cat-bar"></div>
      <div id="spot-list"></div>
    </div>

  </div>
</div>
</div>

function loadData(){
  try{
    const saved=localStorage.getItem(STORAGE_KEY);
    if(saved){
      const d=JSON.parse(saved);
      if(!d.cats||!d.cats.length)d.cats=JSON.parse(JSON.stringify(DEFAULT_CATS));
      return d;
    }
  }catch(e){}
  return{chk:DEFAULT_CHK,exp:[],todo:DEFAULT_TODO,cats:JSON.parse(JSON.stringify(DEFAULT_CATS)),expUid:0,openSections:{}};
}
function saveData(){
  try{localStorage.setItem(STORAGE_KEY,JSON.stringify({chk:chkData,exp:expData,todo:todoData,cats,expUid,openSections}));}catch(e){}
}

let {chk:chkData,exp:expData,todo:todoData,cats,expUid,openSections}=loadData();
if(!openSections)openSections={};
if(!expUid)expUid=0;
chkData.forEach(it=>{if(!cats.some(c=>c.name===it.cat))cats.push({name:it.cat,icon:'📦'});});

let chkFilter='all', currentTab='checklist';

function toast(msg){
  const el=document.getElementById('toast');
  el.textContent=msg; el.classList.add('show');
  setTimeout(()=>el.classList.remove('show'),2000);
}
function switchTab(t){
  currentTab=t;
  const tabs=['checklist','expense','todo','spot'];
  document.querySelectorAll('.nav-item').forEach((b,i)=>b.classList.toggle('active',tabs[i]===t));
  document.querySelectorAll('.pane').forEach(p=>p.classList.remove('active'));
  document.getElementById('pane-'+t).classList.add('active');
  document.getElementById('topbar-title').textContent=TOPBAR_TITLES[t];
  updateTopbarSub();
}
function updateTopbarSub(){
  const sub=document.getElementById('topbar-sub');
  if(currentTab==='checklist'){const done=chkData.filter(i=>i.done).length;sub.textContent=done+' / '+chkData.length+' items';}
  else if(currentTab==='expense'){const t=expData.reduce((s,e)=>s+(e.amount*(RATES[e.cur]||1)),0);sub.textContent='合計 ¥'+Math.round(t).toLocaleString();}
  else if(currentTab==='todo'){const done=todoData.filter(i=>i.done).length;sub.textContent=done+' / '+todoData.length+' done';}
  else{sub.textContent=PINS_DATA.features.length+'件のスポット';}
}

// ===== CHECKLIST =====
function setFilter(f,btn){chkFilter=f;document.querySelectorAll('.filter-btn').forEach(b=>b.classList.remove('active'));btn.classList.add('active');renderChk();}
function renderChk(){
  const grps={};cats.forEach(c=>grps[c.name]=[]);
  chkData.forEach(it=>{if(!grps[it.cat])grps[it.cat]=[];const show=chkFilter==='all'||(chkFilter==='done'&&it.done)||(chkFilter==='undone'&&!it.done);if(show)grps[it.cat].push(it);});
  document.getElementById('chk-groups').innerHTML=cats.map(c=>{
    const cat=c.name,visible=grps[cat]||[],allInCat=chkData.filter(i=>i.cat===cat);
    const doneCount=allInCat.filter(i=>i.done).length,complete=allInCat.length>0&&doneCount===allInCat.length;
    const isOpen=openSections[cat]!==false;
    return`<div class="section-wrap"><div class="section-hdr ${isOpen?'open':''}" data-cat="${esc(cat)}"><span class="sec-icon">${esc(c.icon)}</span><span class="sec-name">${esc(cat)}</span><span class="sec-count${complete?' complete':''}">${doneCount}/${allInCat.length}</span><span class="sec-chev" style="transform:rotate(${isOpen?0:-90}deg)">▾</span></div>${isOpen?`<div class="sec-body">${visible.length===0?'<div class="empty-msg">表示なし</div>':visible.map(it=>`<div class="chk-item"><input class="chk-cb" type="checkbox" ${it.done?'checked':''} data-id="${it.id}"><div class="chk-content"><div class="chk-label${it.done?' done':''}">${esc(it.name)}</div>${it.note?`<div class="chk-note">${esc(it.note)}</div>`:''}</div><button class="del-btn" data-del="${it.id}">✕</button></div>`).join('')}</div>`:''}</div>`;
  }).join('');
  const done=chkData.filter(i=>i.done).length,total=chkData.length,pct=total?Math.round(done/total*100):0;
  document.getElementById('chk-stat-done').textContent=done;
  document.getElementById('chk-stat-total').textContent=total;
  document.getElementById('chk-stat-pct').textContent=pct+'%';
  document.getElementById('chk-progress').style.width=pct+'%';
  document.getElementById('nav-badge-chk').textContent=done+'/'+total;
  updateTopbarSub();
}
document.getElementById('chk-groups').addEventListener('click',e=>{
  const cb=e.target.closest('.chk-cb');if(cb){toggleChk(+cb.dataset.id);return;}
  const del=e.target.closest('.del-btn');if(del){delChk(+del.dataset.del);return;}
  const hdr=e.target.closest('.section-hdr');if(hdr)toggleSec(hdr.dataset.cat);
});
function toggleSec(cat){openSections[cat]=openSections[cat]===false?true:false;saveData();renderChk();}
function toggleChk(id){const i=chkData.find(x=>x.id===id);if(i){i.done=!i.done;saveData();renderChk();}}
function delChk(id){chkData=chkData.filter(x=>x.id!==id);saveData();renderChk();renderCatMgr();toast('削除しました');}
function addChk(){
  const n=document.getElementById('chk-new-name').value.trim();
  const note=document.getElementById('chk-new-note').value.trim();
  const cat=document.getElementById('chk-cat-sel').value;
  if(!n){toast('アイテム名を入れてください');return;}
  chkData.push({id:uid(),cat,name:n,note,done:false});
  document.getElementById('chk-new-name').value='';document.getElementById('chk-new-note').value='';
  openSections[cat]=true;saveData();renderChk();renderCatMgr();toast('追加しました');
}
function renderCatSelect(){
  const sel=document.getElementById('chk-cat-sel'),cur=sel.value;
  sel.innerHTML=cats.map(c=>`<option value="${esc(c.name)}">${esc(c.icon)} ${esc(c.name)}</option>`).join('');
  if(cats.some(c=>c.name===cur))sel.value=cur;
}
function renderCatMgr(){
  document.getElementById('cat-list').innerHTML=cats.map((c,i)=>{const count=chkData.filter(it=>it.cat===c.name).length;return`<div class="cat-row"><span class="sec-icon">${esc(c.icon)}</span><span class="cat-row-name">${esc(c.name)}</span><span class="sec-count">${count}個</span><button class="del-btn" data-cati="${i}">✕</button></div>`;}).join('');
  renderCatSelect();
}
document.getElementById('cat-list').addEventListener('click',e=>{const btn=e.target.closest('.del-btn');if(btn)delCat(+btn.dataset.cati);});
function toggleCatMgr(){const card=document.getElementById('cat-mgr-card'),btn=document.getElementById('cat-mgr-toggle'),show=card.style.display==='none';card.style.display=show?'block':'none';btn.textContent=show?'⚙ カテゴリ編集を閉じる':'⚙ カテゴリを編集する';}
function addCat(){
  const name=document.getElementById('new-cat-name').value.trim(),icon=document.getElementById('new-cat-icon').value.trim()||'📦';
  if(!name){toast('カテゴリ名を入れてください');return;}
  if(cats.some(c=>c.name===name)){toast('同じ名前があります');return;}
  cats.push({name,icon});openSections[name]=true;
  document.getElementById('new-cat-name').value='';document.getElementById('new-cat-icon').value='';
  saveData();renderChk();renderCatMgr();toast('追加しました');
}
function delCat(i){
  const c=cats[i];if(!c)return;
  if(cats.length<=1){toast('最後のカテゴリは削除できません');return;}
  const items=chkData.filter(it=>it.cat===c.name);
  if(items.length>0&&!confirm('「'+c.name+'」と中のアイテム'+items.length+'個を削除します。よろしいですか？'))return;
  chkData=chkData.filter(it=>it.cat!==c.name);cats.splice(i,1);
  saveData();renderChk();renderCatMgr();toast('削除しました');
}

  const tbody=document.getElementById('exp-tbody');
  if(!expData.length){tbody.innerHTML='<tr><td colspan="5" style="text-align:center;color:var(--muted);padding:20px;font-size:12px;font-family:var(--mono)">費用がまだありません</td></tr>';}
  else{tbody.innerHTML=expData.map(e=>{const col=EXP_COLORS[e.cat]||'#888',sym=e.cur==='JPY'?'¥':e.cur==='IDR'?'Rp':'$';return`<tr><td style="color:var(--muted);font-family:var(--mono)">${esc(e.date||'—')}</td><td title="${esc(e.name)}">${esc(e.name)}</td><td><span class="cat-dot" style="background:${col}"></span>${esc(e.cat)}</td><td style="text-align:right;font-family:var(--mono);color:var(--accent)">${sym}${Math.round(e.amount).toLocaleString()}</td><td><button class="del-btn" data-expdel="${e.id}">✕</button></td></tr>`;}).join('');}
  const tJPY=expData.reduce((s,e)=>s+(e.amount*(RATES[e.cur]||1)),0);
  document.getElementById('exp-stat-jpy').textContent='¥'+Math.round(tJPY).toLocaleString();
  document.getElementById('exp-stat-idr').textContent='Rp'+Math.round(tJPY/RATES.IDR).toLocaleString();
  document.getElementById('exp-stat-cnt').textContent=expData.length;
  document.getElementById('exp-grand').textContent='¥'+Math.round(tJPY).toLocaleString();
  document.getElementById('nav-badge-exp').textContent=expData.length;
  updateTopbarSub();
}
document.getElementById('exp-tbody').addEventListener('click',e=>{const btn=e.target.closest('.del-btn');if(btn)delExp(+btn.dataset.expdel);});
function addExp(){
  const n=document.getElementById('exp-name').value.trim(),a=parseFloat(document.getElementById('exp-amt').value);
  if(!n||!a){toast('内容と金額を入れてください');return;}
  expData.push({id:++expUid,name:n,cat:document.getElementById('exp-cat').value,amount:a,cur:document.getElementById('exp-cur').value,date:document.getElementById('exp-date').value});
  document.getElementById('exp-name').value='';document.getElementById('exp-amt').value='';
  saveData();renderExp();toast('追加しました');
}
function delExp(id){expData=expData.filter(x=>x.id!==id);saveData();renderExp();toast('削除しました');}

// ===== TODO =====
const tdOpenSec={food:true,sight:true,shop:true,other:true};
function renderTodo(){
  const grps={food:[],sight:[],shop:[],other:[]};
  todoData.forEach(it=>{if(grps[it.cat])grps[it.cat].push(it);});
  document.getElementById('todo-groups').innerHTML=Object.keys(TODO_LABELS).map(cat=>{
    const items=grps[cat],doneC=items.filter(i=>i.done).length,isOpen=tdOpenSec[cat]!==false;
    return`<div class="section-wrap"><div class="section-hdr ${isOpen?'open':''}" data-tdcat="${cat}"><span class="sec-name">${TODO_LABELS[cat]}</span><span class="sec-count">${doneC}/${items.length}</span><span class="sec-chev" style="transform:rotate(${isOpen?0:-90}deg)">▾</span></div>${isOpen?`<div class="sec-body">${items.length===0?'<div class="empty-msg">まだありません</div>':items.map(it=>`<div class="todo-item"><input class="chk-cb" type="checkbox" ${it.done?'checked':''} data-tdid="${it.id}"><div style="flex:1;min-width:0"><div class="todo-name${it.done?' done':''}"><span class="tag ${TODO_TAG[it.cat]}">${TODO_LABELS[it.cat].split('・')[0]}</span>${esc(it.name)}</div>${it.note?`<div class="todo-note">${esc(it.note)}</div>`:''}</div><button class="del-btn" data-tddel="${it.id}">✕</button></div>`).join('')}</div>`:''}</div>`;
  }).join('');
  const done=todoData.filter(i=>i.done).length,total=todoData.length;
  document.getElementById('td-stat-done').textContent=done;
  document.getElementById('td-stat-left').textContent=total-done;
  document.getElementById('td-stat-total').textContent=total;
  document.getElementById('nav-badge-todo').textContent=done+'/'+total;
  updateTopbarSub();
}
document.getElementById('todo-groups').addEventListener('click',e=>{
  const cb=e.target.closest('.chk-cb');if(cb){toggleTodo(+cb.dataset.tdid);return;}
  const del=e.target.closest('.del-btn');if(del){delTodo(+del.dataset.tddel);return;}
  const hdr=e.target.closest('.section-hdr');if(hdr)toggleTdSec(hdr.dataset.tdcat);
});
function toggleTdSec(cat){tdOpenSec[cat]=tdOpenSec[cat]===false?true:false;renderTodo();}
function toggleTodo(id){const i=todoData.find(x=>x.id===id);if(i){i.done=!i.done;saveData();renderTodo();}}
function delTodo(id){todoData=todoData.filter(x=>x.id!==id);saveData();renderTodo();toast('削除しました');}
function addTodo(){
  const n=document.getElementById('td-name').value.trim(),note=document.getElementById('td-note').value.trim(),cat=document.getElementById('td-cat-sel').value;
  if(!n){toast('内容を入れてください');return;}
  todoData.push({id:uid(),cat,name:n,note,done:false});
  document.getElementById('td-name').value='';document.getElementById('td-note').value='';
  saveData();renderTodo();toast('追加しました');
}

// ===== SPOT =====
const ALL_CAT='すべて';
let spotCat=ALL_CAT, spotLocation=null;

function haversineM(lat1,lon1,lat2,lon2){
  const R=6371000,r=d=>d*Math.PI/180;
  const a=Math.sin(r(lat2-lat1)/2)**2+Math.cos(r(lat1))*Math.cos(r(lat2))*Math.sin(r(lon2-lon1)/2)**2;
  return 2*R*Math.asin(Math.sqrt(a));
}
function fmtDist(m){return m<1000?Math.round(m)+' m':(m/1000).toFixed(1)+' km';}

function buildSpotCatBar(){
  const cats2=[ALL_CAT,...new Set(PINS_DATA.features.map(f=>f.properties.category))];
  document.getElementById('spot-cat-bar').innerHTML=cats2.map(c=>`<button class="spot-cat-btn${c===spotCat?' active':''}" onclick="setSpotCat(${JSON.stringify(c)})">${esc(c)}</button>`).join('');
}
function setSpotCat(c){spotCat=c;buildSpotCatBar();renderSpot();}

function renderSpot(){
  let list=PINS_DATA.features;
  if(spotCat!==ALL_CAT)list=list.filter(f=>f.properties.category===spotCat);
  if(spotLocation){
    list=list.map(f=>{const[lon,lat]=f.geometry.coordinates;return{f,dist:haversineM(spotLocation.lat,spotLocation.lon,lat,lon)};}).sort((a,b)=>a.dist-b.dist);
  } else {
    list=list.map(f=>({f,dist:null}));
  }
  const el=document.getElementById('spot-list');
  if(!list.length){el.innerHTML='<div class="spot-empty">スポットが見つかりませんでした</div>';return;}
  el.innerHTML=list.map(({f,dist})=>{
    const p=f.properties,loc=p.location;
    return`<a class="spot-card" href="${esc(p.google_maps_url)}" target="_blank" rel="noopener">
      <div class="spot-card-top"><span>${p.category.split(' ')[0]}</span><span>${esc(loc.name)}</span></div>
      <div class="spot-dist">${dist!==null?'📍 '+fmtDist(dist):'現在地を取得すると距離を表示'}</div>
      <div class="spot-addr">${esc(loc.address||'')}</div>
    </a>`;
  }).join('');
}

function spotLocate(){
  if(!navigator.geolocation){document.getElementById('spot-status').textContent='位置情報に対応していません';return;}
  document.getElementById('spot-status').textContent='現在地を取得中...';
  navigator.geolocation.getCurrentPosition(
    pos=>{spotLocation={lat:pos.coords.latitude,lon:pos.coords.longitude};document.getElementById('spot-status').textContent='現在地を取得しました。近い順に並んでいます。';renderSpot();},
    err=>{document.getElementById('spot-status').textContent='取得できませんでした（'+err.message+'）';},
    {enableHighAccuracy:true,timeout:10000,maximumAge:60000}
  );
}

document.getElementById('chk-new-name').addEventListener('keydown',e=>{if(e.key==='Enter')addChk();});
document.getElementById('new-cat-name').addEventListener('keydown',e=>{if(e.key==='Enter')addCat();});

document.getElementById('exp-amt').addEventListener('keydown',e=>{if(e.key==='Enter')addExp();});
document.getElementById('exp-date').valueAsDate=new Date();

// ===== INIT =====
renderChk();renderCatMgr();renderExp();renderTodo();buildSpotCatBar();renderSpot();
